    status: approved
    type: object
    description: Describes the source (generally journal) of the production
  source.isInDOAJ:
    status: approved
    type: unknown
    description: Is it indexed in DOAJ?
  source.isInDoaj:
    status: draft
    type: boolean

    ai_suggestion:
      description: Indicates if the publication's source journal is listed in the
