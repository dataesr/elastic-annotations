_meta:
  index: scanr-publications
  total_fields: 333
  approved: 51
  draft: 282
fields:
  acknowledgments:
    status: draft
    type: object
    ai_suggestion:
      description: Contains funding or gratitude statements related to the publication.
      notes: May include grant numbers, institution names, or personal acknowledgments.
  acknowledgments.acknowledgments:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Text of the acknowledgment statement in the specified language.
  acknowledgments.lang:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Language code (ISO 639-1) of the acknowledgment text.
      notes: Use to filter or display acknowledgments in the correct language.
  affiliations:
    status: approved
    type: array
    description: Lists all detected affiliations
  affiliations.acronym:
    status: draft
    type: object
    ai_suggestion:
      description: Acronyms of the affiliation in multiple languages.
      notes: Present only if the affiliation is mapped in the organization index.
  affiliations.acronym.default:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Default acronym of the affiliation if no language-specific version
        exists.
  affiliations.acronym.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English acronym of the affiliation.
  affiliations.acronym.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French acronym of the affiliation.
  affiliations.country:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: ISO 3166-1 alpha-2 country code where the affiliation is located.
      notes: Useful for filtering or aggregating by country.
  affiliations.id:
    status: approved
    type: text
    description: "PID of an affiliation. Can be the only field of the object if this
      affiliation is not mapped in the organization index.Otherwise, if present, some
      fields are denormalized: `mainAddress`, `label`, `acronym`, `kind`, `level`,
      `status`, `isFrench`, `id_name`. See the documention of the organization index
      for more details on these fields."
    has_keyword: true
    required: true
  affiliations.id_name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Normalized name of the affiliation for display or search purposes.
      notes: Derived from the PID or raw affiliation string.
  affiliations.isFrench:
    status: draft
    type: boolean
    ai_suggestion:
      description: Indicates whether the affiliation is based in France (true/false).
      notes: Use for filtering French institutions or compliance checks.
  affiliations.kind:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Type of the affiliation (e.g., laboratory, university, research
        institute).
      notes: Common values include 'laboratory', 'department', or 'institution'; may
        be null if unknown.
  affiliations.label:
    status: draft
    type: object
    ai_suggestion:
      description: Multilingual labels for the affiliation, keyed by language code.
  affiliations.label.default:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: Default name of the affiliation if no language-specific label is
        available.
  affiliations.label.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English name of the affiliation.
  affiliations.label.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French name of the affiliation.
  affiliations.level:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Hierarchical level of the affiliation (e.g., department, faculty).
      notes: Values like '1' (top-level) or '2' (sub-unit) indicate nesting; may be
        omitted.
  affiliations.mainAddress:
    status: draft
    type: object
    ai_suggestion:
      description: Primary physical address details for the affiliation.
  affiliations.mainAddress.address:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Full formatted address of the affiliation's main location.
  affiliations.mainAddress.city:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: City of the affiliation's main address.
  affiliations.mainAddress.country:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Country of the affiliation's main address.
      notes: Use ISO 3166-1 alpha-2 codes (e.g., 'FR', 'US') when available.
  affiliations.mainAddress.gps:
    status: draft
    type: object

    ai_suggestion:
      description: Geographic coordinates of the affiliation's main address, if available.
      notes: Use for mapping or distance-based queries; may be absent for virtual
        or undisclosed locations.
  affiliations.mainAddress.gps.lat:
    status: draft
    type: float

    ai_suggestion:
      description: Latitude component of the affiliation's main address GPS coordinates.
      notes: "Value range: -90 to 90; verify existence of parent `gps` object before
        use."
  affiliations.mainAddress.gps.lon:
    status: draft
    type: float

    ai_suggestion:
      description: Longitude component of the affiliation's main address GPS coordinates.
      notes: "Value range: -180 to 180; verify existence of parent `gps` object before
        use."
  affiliations.mainAddress.postcode:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Postal code of the affiliation's main address, if applicable.
      notes: Format varies by country; may include letters or special characters.
  affiliations.status:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Operational status of the affiliation (e.g., active, closed).
      notes: Use to filter or contextualize historical vs. current affiliations.
  authors:
    status: approved
    type: array
    description: " List the authors / contributor"
  authors.affiliations:
    status: approved
    type: array
    description: List of objects object describing the authors's affiliations
  authors.affiliations.BNF:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Biblioth�que Nationale de France identifier for the author's
        affiliation.
      notes: Use for disambiguation when `id` is missing or ambiguous.
  authors.affiliations.ISNI:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: International Standard Name Identifier for the author's affiliation.
      notes: Standardized ID for organizations; prioritize over raw strings for matching.
  authors.affiliations.acronym:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Short form or abbreviation of the author's affiliation name.
      notes: May differ from official name; useful for display or fuzzy matching.
  authors.affiliations.address:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Full physical address of the author's affiliation, if available.
      notes: Unstructured; prefer parsed fields (e.g., `address-line`) for analysis.
  authors.affiliations.address-line:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Parsed line(s) of the author's affiliation address (e.g., street,
        city).
      notes: Structured alternative to raw `address`; may contain partial data.
  authors.affiliations.addresses:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Physical addresses associated with the author's affiliation.
      notes: May include partial or full addresses; use for geographical context or
        mailing purposes.
  authors.affiliations.alias_idref:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Unique identifier for the affiliation from the IdRef authority
        database.
      notes: Useful for disambiguating affiliations with similar names or linking
        to IdRef records.
  authors.affiliations.aliases:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Alternative names or variants of the affiliation's official name.
      notes: Helps match affiliations across different naming conventions or languages.
  authors.affiliations.city:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: City where the author's affiliation is located.
      notes: May be normalized; use for regional analysis or filtering.
  authors.affiliations.comments:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Human-readable notes about the affiliation, often from the data
        source.
      notes: Can include context like 'former name' or 'merged with X'; not standardized.
  authors.affiliations.country:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Country where the author's affiliation is located.
      notes: Normalized to ISO country codes when possible; use for international
        scope analysis.
  authors.affiliations.datasource:
    status: approved
    type: text
    description: Source of the raw affiliation string
    has_keyword: true
    required: true
  authors.affiliations.department:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Specific department, lab, or sub-unit within the affiliation.
      notes: May be nested (e.g., 'Department of Biology, Lab of Genetics'); not always
        present.
  authors.affiliations.detected_countries:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Countries detected in the raw affiliation string, even if not validated.
      notes: Useful for fuzzy matching or identifying ambiguous affiliations.
  authors.affiliations.docid:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Internal document identifier for the affiliation record.
      notes: Used for internal tracking; not a persistent or external identifier.
  authors.affiliations.ed:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Editorial or publisher-specific code for the affiliation.
      notes: Format varies by source; may be deprecated or source-specific.
  authors.affiliations.external_ids:
    status: draft
    type: object

    ai_suggestion:
      description: External identifiers for the author's affiliation, grouped by type.
      notes: Useful for cross-referencing with external databases or organization
        registries.
  authors.affiliations.external_ids.id_type:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Type of external identifier (e.g., GRID, ROR, ISNI).
      notes: Determines how to interpret `id_value`; may include custom or proprietary
        types.
  authors.affiliations.external_ids.id_value:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Value of the external identifier for the affiliation.
      notes: Format depends on `id_type`; validate against the type before use.
  authors.affiliations.grid:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: GRID identifier for the author's affiliation.
      notes: Deprecated in favor of ROR; included for backward compatibility.
  authors.affiliations.hal_docid:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: HAL document ID linking to the affiliation record.
      notes: Only present if the affiliation was sourced from HAL.
  authors.affiliations.id:
    status: draft
    type: object

    ai_suggestion:
      description: Persistent identifiers for the affiliation, with provenance metadata.
      notes: Prefer this over standalone fields like `grid` or `hal_docid` for consistency.
  authors.affiliations.id.asserted-by:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Source asserting the affiliation ID (e.g., publisher, aggregator).
      notes: Helps assess trustworthiness; values may include 'author', 'publisher',
        or 'system'.
  authors.affiliations.id.id:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Unique identifier for the affiliation, scoped by `id-type`.
      notes: Format varies by `id-type`; may be a URL, UUID, or opaque string.
  authors.affiliations.id.id-type:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Type of the affiliation ID (e.g., ROR, GRID, HAL).
      notes: Determines how to resolve or validate the `id` field.
  authors.affiliations.id_name_author_labo:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Normalized name of the affiliation as used by the author in the
        lab context.
      notes: May differ from official names; useful for disambiguation or fuzzy matching.
  authors.affiliations.idref:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: IdRef identifier for the author's affiliation, linking to the IdRef
        authority database.
      notes: Use this field to resolve or validate the affiliation against the IdRef
        system.
  authors.affiliations.ids:
    status: approved
    type: object
    description: List of automatic match PIDS (object with field `id` and `type`)
    required: true
  authors.affiliations.ids.id:
    status: approved
    type: text
    description: PID of the affiliation
    has_keyword: true
    required: true
  authors.affiliations.ids.source:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Indicates the source of the affiliation identifier in the 'ids'
        object.
      notes: Helps determine the reliability or origin of the identifier for disambiguation.
  authors.affiliations.ids.type:
    status: approved
    type: text
    description: Type of the affiliation
    has_keyword: true
    required: true
  authors.affiliations.name:
    status: approved
    type: text
    description: Raw affiliation string
    has_keyword: true
    analyzer: light
    required: true
  authors.affiliations.orgs:
    status: draft
    type: object

    ai_suggestion:
      description: Lists organizations associated with the author's affiliation.
      notes: May contain nested fields like 'name' or 'id' for detailed organization
        data.
  authors.affiliations.orgs.name:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Name of the organization within the author's affiliation.
      notes: Useful for display or matching against known organization names.
  authors.affiliations.place:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Geographic or institutional place associated with the affiliation.
      notes: Often a city, campus, or department; may be used for geographic filtering.
  authors.affiliations.postal-code:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Postal code of the affiliation's location for geographic identification.
      notes: Useful for mapping or regional analysis; may be missing for non-physical
        affiliations.
  authors.affiliations.rnsr:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: RNSR identifier for the affiliation, linking to the French research
        organization registry.
      notes: Primarily relevant for French institutions; use to cross-reference with
        RNSR data.
  authors.affiliations.ror:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: ROR identifier for the affiliation, linking to the Research Organization
        Registry.
      notes: Globally unique; use to resolve or validate the organization across datasets.
  authors.affiliations.structId:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Internal structural identifier for the affiliation within a specific
        system.
      notes: System-specific; may not be portable across different data sources.
  authors.affiliations.toIdentify2:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Flag indicating if the affiliation requires further identification
        or disambiguation.
      notes: When 'true', the affiliation may need manual review or additional context.
  authors.affiliations.viaf:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: VIAF identifier for the author's affiliation, linking to the Virtual
        International Authority File.
      notes: Use this field to disambiguate affiliations or link to external authority
        records.
  authors.affiliations.websites:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: URLs of websites associated with the author's affiliation.
      notes: May include institutional homepages or departmental pages; verify availability
        before use.
  authors.affiliations.zipcode:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Postal zip code of the author's affiliation address.
      notes: Format varies by country; not always numeric or present.
  authors.denormalized:
    status: approved
    type: object
    description: PID of the author (`id` (with idref prefix), `id_hal`, `orcid`)
  authors.denormalized.id:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Unique internal identifier for the denormalized author record.
      notes: Used for internal linking; prefer persistent IDs (e.g., ORCID) for external
        use.
  authors.denormalized.id_hal:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: HAL author identifier for the denormalized author record.
      notes: Specific to the HAL repository; may be absent for non-HAL sources.
  authors.denormalized.idref:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: IdRef identifier for the denormalized author record, from the French
        authority file.
      notes: Primarily used in French academic contexts; may overlap with other IDs.
  authors.denormalized.orcid:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: ORCID identifier for the denormalized author record.
      notes: Persistent, globally unique ID; prioritize this for author disambiguation.
  authors.firstName:
    status: approved
    type: text
    description: first name
    has_keyword: true
    analyzer: light
    required: true
  authors.fullName:
    status: approved
    type: text
    description: full name
    has_keyword: true
    analyzer: light
    primary: true
    required: true
  authors.id_name:
    status: approved
    type: text
    description: Concatenation of the `id` and `fullName` separated by `###`.
    has_keyword: true
  authors.lastName:
    status: approved
    type: text
    description: last name
    has_keyword: true
    analyzer: light
    required: true
  authors.person:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Full name of the author as a single string, formatted for display.
      notes: May include honorifics or suffixes; not normalized for sorting or matching.
  authors.role:
    status: approved
    type: text
    description: Role of the contributor. Default value is `author`. A different value
      only if present in source (theses.fr or HAL).
    has_keyword: true
    primary: true
  authors.tags:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: User-defined or system-generated labels for the author (e.g., 'corresponding').
      notes: Tags are source-dependent; validate meaning before use.
  authors.toIdentify:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Flag indicating if the author's identity requires manual verification.
      notes: Set to 'true' when automatic matching fails; prioritize resolution for
        accuracy.
  authorsCount:
    status: approved
    type: long
    description: Number of authors.
    required: true
  autocompleted:
    status: approved
    type: text
    description: array of strings used for autocompletion
    analyzer: autocomplete
  autocompletedJournal:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Normalized journal name for autocomplete suggestions, derived from
        raw journal metadata.
  autocompletedPublisher:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Normalized publisher name for autocomplete suggestions, derived
        from raw publisher metadata.
  bso_local_affiliations:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Affiliations identified as French research organizations (BSO-compliant).
      notes: Use this field to filter or highlight French institutional contributions.
  cited_by_counts_by_year:
    status: draft
    type: object

    ai_suggestion:
      description: Annual citation counts for this publication, keyed by year.
  cited_by_counts_by_year.2012:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2012.
  cited_by_counts_by_year.2013:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2013.
  cited_by_counts_by_year.2014:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2014.
  cited_by_counts_by_year.2015:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2015.
  cited_by_counts_by_year.2016:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2016.
  cited_by_counts_by_year.2017:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by this publication in 2017.
  cited_by_counts_by_year.2018:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2018.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2019:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2019.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2020:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2020.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2021:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2021.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2022:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2022.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2023:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2023.
      notes: Value may be zero or missing if no citation data is available for that
        year.
  cited_by_counts_by_year.2024:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2024.
      notes: Value may be zero or missing if citation data is incomplete or unavailable.
  cited_by_counts_by_year.2025:
    status: draft
    type: long

    ai_suggestion:
      description: Number of citations received by the publication in 2025.
      notes: Value is likely zero or missing as citation data is typically not yet
        available.
  co_authors:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: List of unique co-author names associated with the publication.
  co_countries:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: List of unique countries derived from co-author affiliations.
      notes: Countries are normalized to ISO 3166-1 alpha-2 codes where possible.
  co_domains:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: List of scientific domains co-associated with the publication.
      notes: Used for cross-domain analysis; may overlap with primary domains.
  co_institutions:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Identifiers of institutions collaborating on or funding the publication.
  co_projects:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Identifiers of research projects linked to the publication.
  co_software:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Names or identifiers of software tools or platforms cited in the
        publication.
  co_structures:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Identifiers of research structures (e.g., labs) involved in the
        publication.
  doiUrl:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Resolvable URL for the publication's DOI, if available.
  domains:
    status: approved
    type: array
    description: Lists detected scientific domains
    primary: true
  domains.code:
    status: approved
    type: text
    description: Code ID of this domain, if any (depends on `type`)
    has_keyword: true
  domains.count:
    status: approved
    type: long
    description: Number of times this code has been detected within the title, abstract
      and keywords.
  domains.id_name:
    status: approved
    type: text
    description: Concatenation of code and label, separated by `##`
    has_keyword: true
    example: wikidata##Q13442896
  domains.key_name:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Machine-readable key for the domain (e.g., 'info.info-ai' for AI).
  domains.label:
    status: draft
    type: object

    ai_suggestion:
      description: Human-readable name of the domain in multiple languages.
      notes: Keys are ISO 639-1 language codes (e.g., 'en', 'fr').
  domains.label.default:
    status: approved
    type: text
    description: Label of the scientific domain
    has_keyword: true
    analyzer: light
    required: true
  domains.naturalKey:
    status: approved
    type: text
    description: Normalized version of the label string (no accent, no space ...)
    has_keyword: true
  domains.type:
    status: approved
    type: text
    description: "Type of label. Possible values: `wikidata`, `keyword`, `sudoc`.
      Wikidata domains are automatically detected within the title, abstract and keywords.
      Keywords domain are exactly the free-text keywords that have been harvested
      (not normalized)."
    has_keyword: true
    required: true
  externalIds:
    status: approved
    type: array
    description: Lists the known external identifiers
  externalIds.id:
    status: approved
    type: text
    description: Corresponding PID
    has_keyword: true
    primary: true
    required: true
  externalIds.type:
    status: approved
    type: text
    description: "`nnt` (for French thesis, 'nnt' stands for 'Numéro National
      de Thèse'), `doi` (Digital Object Identifier), `hal` (if present in HAL) or
      'pmid' (if present in PubMed)"
    has_keyword: true
    primary: true
    enum:
      - doi
      - hal
      - pmid
      - nnt
    required: true
  id:
    status: approved
    type: text
    description: Main PID of the production. This id is a concatenation of the id
      type (e.g `doi` and the id itself).
    has_keyword: true
    primary: true
    required: true
  isOa:
    status: approved
    type: boolean
    description: Is Open Access? Computed with Unpaywall data if DOI crossref, with
      HAL and theses.fr otherwise.
    primary: true
  ix:
    status: draft
    type: long

    ai_suggestion:
      description: Internal index identifier for the publication record.
  keywords:
    status: draft
    type: object

    ai_suggestion:
      description: List of objects describing keywords associated with the publication.
      notes: May include language-specific labels and controlled vocabularies.
  keywords.default:
    status: approved
    type: array
    description: List of string. Keywords (not normalized) chosen by the authors.
      These keywords are also present in the `domains` with type=`keyword`.
    has_keyword: true
    analyzer: light
  landingPage:
    status: approved
    type: text
    description: URL of the landing page
    has_keyword: true
  oaEvidence:
    status: approved
    type: object
    description: Describes the open access version (if any)
  oaEvidence.hostType:
    status: approved
    type: text
    description: Only one hostType is given, with a priority to the publisher, just
      like in the Unpaywall data. More complete data on open access routes can be
      found in the French Open Science Monitor data (Baromètre de la Science Ouverte).
    has_keyword: true
    enum:
      - publisher
      - repository
    required: true
  oaEvidence.landingPageUrl:
    status: approved
    type: text
    description: Landing page URL (from Unpaywall data)
    has_keyword: true
  oaEvidence.license:
    status: approved
    type: text
    description: Open Access license (from Unpaywall data or HAL)
    has_keyword: true
  oaEvidence.pdfUrl:
    status: approved
    type: text
    description: PDF URL (from Unpaywall data)
    has_keyword: true
  oaEvidence.url:
    status: approved
    type: text
    description: Open Access URL (from Unpaywall data or HAL)
    has_keyword: true
  oaEvidence.version:
    status: approved
    type: text
    description: Open Access version (from Unpaywall data)
    has_keyword: true
  pdfUrl:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: URL to the full-text PDF of the publication if openly available.
  predict_teds:
    status: draft
    type: object

    ai_suggestion:
      description: Predicted TEI Document Type (TEDS) classifications with confidence
        scores.
      notes: Use this for filtering or ranking publications by predicted document
        types like 'journal-article' or 'thesis'.
  predict_teds.label:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Predicted TEI Document Type (TED) label, e.g., 'journal-article'
        or 'thesis'.
  predict_teds.probability:
    status: draft
    type: float

    ai_suggestion:
      description: Confidence score (0.0 to 1.0) for the predicted TEI Document Type
        label.
      notes: Higher values indicate greater confidence; threshold at 0.7 for reliable
        predictions.
  productionType:
    status: approved
    type: text
    description: "String for type of production. Possible values: `publications`,
      `thesis`."
    has_keyword: true
    enum:
      - publication
      - thesis
    required: true
  project:
    status: draft
    type: object

    ai_suggestion:
      description: Funding project associated with the publication, if any.
      notes: May include nested fields like `label` or `acronym` for project identification.
  project.label:
    status: draft
    type: object

    ai_suggestion:
      description: Localized labels for the funding project, keyed by language code.
      notes: Use `default` for the primary label if no language preference is specified.
  project.label.default:
    status: draft
    type: text

    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: Default label for the funding project in its primary language.
  projects:
    status: draft
    type: object

    ai_suggestion:
      description: List of funding projects associated with the publication.
      notes: Each project may include fields like `label` or `acronym` for identification.
  projects.acronym:
    status: draft
    type: object

    ai_suggestion:
      description: Localized acronyms for the funding project, keyed by language code.
      notes: Use `default` for the primary acronym if no language preference is specified.
