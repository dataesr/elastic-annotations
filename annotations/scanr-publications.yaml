      (if present in PubMed)'
    has_keyword: true
    primary: true
    enum:
    - doi
    - hal
    - pmid
    - nnt
    required: true
  id:
    status: approved
    type: string
    description: Main PID of the production. This id is a concatenation of the id
      type (e.g `doi` and the id itself).
    has_keyword: true
    primary: true
    required: true
  isOa:
    status: approved
    type: boolean
    description: Is Open Access? Computed with Unpaywall data if DOI crossref, with
      HAL and theses.fr otherwise.
