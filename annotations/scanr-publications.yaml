    description: Open Access license (from Unpaywall data or HAL)
    has_keyword: true
  oaEvidence.pdfUrl:
    status: approved
    type: string
    description: PDF URL (from Unpaywall data)
    has_keyword: true
  oaEvidence.url:
    status: approved
    type: string
    description: Open Access URL (from Unpaywall data or HAL)
    has_keyword: true
  oaEvidence.version:
    status: approved
    type: string
    description: Open Access version (from Unpaywall data)
    has_keyword: true
  pdfUrl:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
