      found in the French Open Science Monitor data (Baromètre de la Science Ouverte).
    has_keyword: true
    enum:
    - publisher
    - repository
    required: true
  oaEvidence.landingPageUrl:
    status: approved
    type: string
    description: Landing page URL (from Unpaywall data)
    has_keyword: true
  oaEvidence.license:
    status: approved
