_meta:
  index: scanr-publications
  description: Scientific publications (articles, theses, conference papers). One
    document is one publication.
  total_fields: 330
  approved: 48
  draft: 282
fields:
  acknowledgments:
    status: draft
    type: object
    ai_suggestion:
      description: Contains acknowledgment-related information for the publication.
      notes: Use this field to extract funding sources or gratitude statements when
        analyzing research impact or funding patterns.
  acknowledgments.acknowledgments:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Full text of acknowledgments as written in the publication.
  acknowledgments.lang:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Language code (ISO 639-1) of the acknowledgments text.
      notes: Default to 'en' if unspecified; may be missing for non-standardized sources.
  affiliations:
    status: approved
    type: array
    description: Lists all detected affiliations
  affiliations.acronym:
    status: draft
    type: object
    ai_suggestion:
      description: Acronym variations of the affiliation in multiple languages.
      notes: Check for language-specific fields (e.g., 'en', 'fr') before falling
        back to 'default'.
  affiliations.acronym.default:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Default acronym of the affiliation if no language-specific version
        exists.
  affiliations.acronym.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English acronym of the affiliation.
  affiliations.acronym.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French acronym of the affiliation.
  affiliations.country:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Country where the affiliation is located (ISO 3166-1 alpha-2 code).
      notes: May be missing for historical or disputed affiliations.
  affiliations.id:
    status: approved
    type: string
    description: 'PID of an affiliation. Can be the only field of the object if this
      affiliation is not mapped in the organization index.Otherwise, if present, some
      fields are denormalized: `mainAddress`, `label`, `acronym`, `kind`, `level`,
      `status`, `isFrench`, `id_name`. See the documention of the organization index
      for more details on these fields.'
    has_keyword: true
    primary: true
    required: true
    cross_index:
      index: scanr-organizations
      join_field: id
  affiliations.id_name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Human-readable name of the affiliation derived from its PID.
      notes: Useful for display when denormalized fields are unavailable.
  affiliations.isFrench:
    status: draft
    type: boolean
    ai_suggestion:
      description: Indicates whether the affiliation is based in France (true/false).
      notes: Derived from country code; may be null if country is unknown.
  affiliations.kind:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Classification of the affiliation (e.g., university, research institute,
        company).
      notes: Use this to filter or categorize organizations by their institutional
        type.
  affiliations.label:
    status: draft
    type: object
    ai_suggestion:
      description: Multilingual labels for the affiliation's name, keyed by language
        code.
  affiliations.label.default:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: Default name of the affiliation when no language-specific label
        is available.
  affiliations.label.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English name of the affiliation, if available.
  affiliations.label.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French name of the affiliation, if available.
  affiliations.level:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Hierarchical level of the affiliation (e.g., department, faculty,
        institution).
      notes: Useful for understanding the organizational structure or filtering by
        granularity.
  affiliations.mainAddress:
    status: draft
    type: object
    ai_suggestion:
      description: Primary address details for the affiliation, including city and
        country.
  affiliations.mainAddress.address:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Full street address of the affiliation's main location.
  affiliations.mainAddress.city:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: City where the affiliation's main address is located.
  affiliations.mainAddress.country:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Country where the affiliation's main address is located.
  affiliations.mainAddress.gps:
    status: draft
    type: object
    ai_suggestion:
      description: Geographic coordinates of the affiliation's main address, containing
        latitude and longitude.
      notes: Use for mapping or distance-based queries; may be null if coordinates
        are unavailable.
  affiliations.mainAddress.gps.lat:
    status: draft
    type: float
    ai_suggestion:
      description: Latitude value of the affiliation's main address in decimal degrees.
      notes: Valid range is -90 to 90; verify existence before use in spatial queries.
  affiliations.mainAddress.gps.lon:
    status: draft
    type: float
    ai_suggestion:
      description: Longitude value of the affiliation's main address in decimal degrees.
      notes: Valid range is -180 to 180; verify existence before use in spatial queries.
  affiliations.mainAddress.postcode:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Postal code of the affiliation's main address.
      notes: Format varies by country; may include letters or special characters.
  affiliations.status:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Current operational status of the affiliation (e.g., active, closed).
      notes: Use to filter or analyze institutional activity over time.
  authors:
    status: approved
    type: array
    description: ' List the authors / contributor'
  authors.affiliations:
    status: approved
    type: array
    description: List of objects object describing the authors's affiliations
  authors.affiliations.BNF:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Bibliothèque Nationale de France identifier for the author's affiliation.
      notes: Standardized ID; prefer for French institutions when available.
  authors.affiliations.ISNI:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: International Standard Name Identifier for the author's affiliation.
      notes: Global unique ID; use for disambiguation across international datasets.
  authors.affiliations.acronym:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Short form or abbreviation of the author's affiliation name.
      notes: May differ from official acronym; useful for matching abbreviated references.
  authors.affiliations.address:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Full formatted address of the author's affiliation.
      notes: Unstructured; may include multiple lines or country-specific formats.
  authors.affiliations.address-line:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Individual line of the author's affiliation address (e.g., street,
        city).
      notes: Use for partial address matching or display purposes.
  authors.affiliations.addresses:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Full address text of the author's affiliation, as extracted from
        the source.
      notes: May include street, postal code, city, and country in unstructured format.
  authors.affiliations.alias_idref:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Alternative identifier for the affiliation from the IdRef authority
        database.
      notes: Useful for disambiguating affiliations with similar names but different
        identifiers.
  authors.affiliations.aliases:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: List of alternative names or variants for the affiliation.
      notes: Helps match affiliations across publications where naming conventions
        differ.
  authors.affiliations.city:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: City where the author's affiliation is located, as extracted from
        the address.
      notes: May be normalized or standardized for consistency across records.
  authors.affiliations.comments:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Human or machine-generated notes about the affiliation's extraction
        or disambiguation.
      notes: Useful for understanding data quality or parsing challenges.
  authors.affiliations.country:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Country where the author's affiliation is located, as extracted
        from the address.
      notes: May use ISO country codes or full names depending on the source.
  authors.affiliations.datasource:
    status: approved
    type: string
    description: Source of the raw affiliation string
    has_keyword: true
    required: true
  authors.affiliations.department:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Specific department, lab, or sub-unit within the author's affiliation.
      notes: Often nested under larger institutions like universities or research
        centers.
  authors.affiliations.detected_countries:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: List of countries detected in the affiliation string, including
        potential false positives.
      notes: Useful for validating or correcting the primary `country` field.
  authors.affiliations.docid:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Internal document identifier linking the affiliation to its source
        record.
      notes: Primarily for debugging or tracing data provenance.
  authors.affiliations.ed:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Education or institutional designation (e.g., 'PhD program') associated
        with the affiliation.
      notes: Often appears in theses or student publications.
  authors.affiliations.external_ids:
    status: draft
    type: object
    ai_suggestion:
      description: External identifiers for the affiliation, keyed by identifier type.
      notes: Use to cross-reference with external databases or authority files.
  authors.affiliations.external_ids.id_type:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Type of the external identifier (e.g., GRID, ROR, ISNI).
  authors.affiliations.external_ids.id_value:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Value of the external identifier for the affiliation.
  authors.affiliations.grid:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: GRID identifier for the affiliation, if available.
  authors.affiliations.hal_docid:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: HAL document identifier for the affiliation, if applicable.
  authors.affiliations.id:
    status: draft
    type: object
    ai_suggestion:
      description: Reference to the organization in the scanr-organizations index.
      notes: Contains denormalized fields if the organization is mapped; otherwise,
        only the ID is present.
    cross_index:
      index: scanr-organizations
      join_field: id
  authors.affiliations.id.asserted-by:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Indicates which system asserted the affiliation ID (e.g., publisher,
        author).
      notes: Helps assess the reliability of the affiliation mapping.
  authors.affiliations.id.id:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Unique identifier for the affiliation in the referenced system.
  authors.affiliations.id.id-type:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Type of the identifier (e.g., RNSR, GRID, ROR).
  authors.affiliations.id_name_author_labo:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Normalized name of the affiliation as used by the author in the
        publication.
      notes: Useful for disambiguation when the official name differs from the cited
        name.
  authors.affiliations.idref:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: IdRef identifier for the author's affiliation, used for disambiguation
        and linking.
      notes: May be empty if the affiliation lacks an IdRef record or wasn't matched
        during processing.
  authors.affiliations.ids:
    status: approved
    type: array
    description: List of automatic match PIDS (object with field `id` and `type`)
    required: true
  authors.affiliations.ids.id:
    status: approved
    type: string
    description: PID of the affiliation
    has_keyword: true
    required: true
  authors.affiliations.ids.source:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Source of the affiliation identifier (e.g., 'RNSR', 'ROR') in the
        `ids` object.
  authors.affiliations.ids.type:
    status: approved
    type: string
    description: Type of the affiliation
    has_keyword: true
    required: true
  authors.affiliations.name:
    status: approved
    type: string
    description: Raw affiliation string
    has_keyword: true
    analyzer: light
    required: true
  authors.affiliations.orgs:
    status: draft
    type: object
    ai_suggestion:
      description: Normalized organization details extracted from the raw affiliation
        string.
  authors.affiliations.orgs.name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Name of the organization as extracted from the raw affiliation
        string.
  authors.affiliations.place:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Geographic location or city associated with the author's affiliation.
  authors.affiliations.postal-code:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Postal code associated with the author's affiliation, if available.
  authors.affiliations.rnsr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: RNSR identifier for the author's affiliation, used for French research
        organizations.
  authors.affiliations.ror:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: ROR identifier for the author's affiliation, used for global research
        organizations.
  authors.affiliations.structId:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Internal structure identifier for the author's affiliation, if
        applicable.
  authors.affiliations.toIdentify2:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Raw affiliation string flagged for manual identification or disambiguation.
  authors.affiliations.viaf:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: VIAF identifier for the author's affiliation, linking to the Virtual
        International Authority File.
      notes: Use for disambiguation or cross-referencing with external authority records.
  authors.affiliations.websites:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Websites associated with the author's affiliation, typically institutional
        URLs.
      notes: May include multiple URLs; verify for redirects or outdated links.
  authors.affiliations.zipcode:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Postal zip code of the author's affiliation, aiding in geographic
        identification.
      notes: Format varies by country; not always numeric.
  authors.denormalized:
    status: approved
    type: object
    description: PID of the author (`id` (with idref prefix), `id_hal`, `orcid`)
  authors.denormalized.id:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Unique internal identifier for the denormalized author record.
      notes: Used for internal linking; not a persistent external identifier.
  authors.denormalized.id_hal:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: HAL (Hyper Articles en Ligne) identifier for the author, if available.
      notes: Use to fetch additional metadata from HAL's repository.
  authors.denormalized.idref:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: IdRef identifier for the author, linking to the French authority
        database.
      notes: Primarily used in French academic contexts.
  authors.denormalized.orcid:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: ORCID identifier for the author, ensuring unique global identification.
      notes: 'Standardized format: 0000-0000-0000-0000; validate checksum.'
  authors.firstName:
    status: approved
    type: string
    description: first name
    has_keyword: true
    analyzer: light
    required: true
  authors.fullName:
    status: approved
    type: string
    description: full name
    has_keyword: true
    analyzer: light
    primary: true
    required: true
  authors.id_name:
    status: approved
    type: string
    description: Concatenation of the `id` and `fullName` separated by `###`.
    has_keyword: true
  authors.lastName:
    status: approved
    type: string
    description: last name
    has_keyword: true
    analyzer: light
    required: true
  authors.person:
    status: draft
    type: text
    has_keyword: true
    primary: true
    ai_suggestion:
      description: Reference to the author's detailed record in the scanr-persons
        index.
      notes: Use to fetch comprehensive biographical or professional data.
    cross_index:
      index: scanr-persons
      join_field: id
  authors.role:
    status: approved
    type: string
    description: Role of the contributor. Default value is `author`. A different value
      only if present in source (theses.fr or HAL).
    has_keyword: true
  authors.tags:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Tags or keywords associated with the author, often for classification.
      notes: May include roles (e.g., 'corresponding'), disciplines, or statuses.
  authors.toIdentify:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Flag indicating if the author's identity requires further verification.
      notes: Prioritize resolution for ambiguous or incomplete author records.
  authorsCount:
    status: approved
    type: integer
    description: Number of authors.
    primary: true
    required: true
  autocompleted:
    status: approved
    type: array
    description: array of strings used for autocompletion
    analyzer: autocomplete
  autocompletedJournal:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Normalized journal name for search autocompletion and display.
      notes: May differ from the original journal field if canonicalization was applied.
  autocompletedPublisher:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Normalized publisher name for search autocompletion and display.
      notes: May differ from the original publisher field if canonicalization was
        applied.
  bso_local_affiliations:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Affiliations identified by the BSO (Bibliometric System for Organizations)
        algorithm.
  cited_by_counts_by_year:
    status: draft
    type: object
    ai_suggestion:
      description: Annual citation counts for the publication, keyed by year.
  cited_by_counts_by_year.2012:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2012.
  cited_by_counts_by_year.2013:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2013.
  cited_by_counts_by_year.2014:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2014.
  cited_by_counts_by_year.2015:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2015.
  cited_by_counts_by_year.2016:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2016.
  cited_by_counts_by_year.2017:
    status: draft
    type: long
    ai_suggestion:
      description: Number of times the publication was cited in 2017.
  cited_by_counts_by_year.2018:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2018.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2019:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2019.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2020:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2020.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2021:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2021.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2022:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2022.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2023:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2023.
      notes: Use to analyze yearly citation trends or compare impact across years.
  cited_by_counts_by_year.2024:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2024.
      notes: Data may be partial for recent years; use cautiously for analysis.
  cited_by_counts_by_year.2025:
    status: draft
    type: long
    ai_suggestion:
      description: Number of citations received by the publication in 2025.
      notes: Data is likely incomplete or projected; avoid relying on this for analysis.
  co_authors:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: List of co-authors associated with the publication.
      notes: Useful for identifying collaboration networks or author relationships.
  co_countries:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: List of countries represented by the publication's co-authors.
      notes: Helps assess international collaboration or geographic distribution of
        research.
  co_domains:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Broad scientific domains associated with collaborating entities
        in the publication.
  co_institutions:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Institutions that collaborated on the publication, listed as free
        text.
  co_projects:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Research projects linked to the publication, listed as free text.
  co_software:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Software tools or platforms mentioned in collaboration contexts
        for the publication.
  co_structures:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Organizational structures (e.g., labs, departments) involved in
        the publication.
  doiUrl:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Resolvable URL for the publication's DOI, enabling direct access
        to the record.
  domains:
    status: approved
    type: array
    description: Lists detected scientific domains
  domains.code:
    status: approved
    type: string
    description: Code ID of this domain, if any (depends on `type`)
    has_keyword: true
  domains.count:
    status: approved
    type: integer
    description: Number of times this code has been detected within the title, abstract
      and keywords.
  domains.id_name:
    status: approved
    type: string
    description: Concatenation of code and label, separated by `##`
    has_keyword: true
    example: wikidata##Q13442896
  domains.key_name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Machine-readable key for the scientific domain (e.g., 'cs.AI' for
        Computer Science).
      notes: Use for filtering or grouping publications by standardized domain codes.
  domains.label:
    status: draft
    type: object
    ai_suggestion:
      description: Human-readable name of the scientific domain in multiple languages.
      notes: Prefer `key_name` for programmatic use; use `label` for display purposes.
  domains.label.default:
    status: approved
    type: string
    description: Label of the scientific domain
    has_keyword: true
    analyzer: light
    primary: true
    required: true
  domains.naturalKey:
    status: approved
    type: string
    description: Normalized version of the label string (no accent, no space ...)
    has_keyword: true
  domains.type:
    status: approved
    type: string
    description: 'Type of label. Possible values: `wikidata`, `keyword`, `sudoc`.
      Wikidata domains are automatically detected within the title, abstract and keywords.
      Keywords domain are exactly the free-text keywords that have been harvested
      (not normalized).'
    has_keyword: true
    required: true
  externalIds:
    status: approved
    type: array
    description: Lists the known external identifiers
  externalIds.id:
    status: approved
    type: string
    description: Corresponding PID
    has_keyword: true
    primary: true
    required: true
  externalIds.type:
    status: approved
    type: string
