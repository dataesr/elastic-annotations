    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Default acronym for the funding project in its primary language.
  projects.id:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Persistent identifier (PID) of a research project associated with
        the publication.
  projects.id_name:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Human-readable name of the project, derived from its PID.
      notes: Use this for display purposes when the PID alone is insufficient.
  projects.label:
    status: draft
    type: object

    ai_suggestion:
      description: Multilingual labels for the project, keyed by language code.
  projects.label.en:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: English label for the project, if available.
  projects.label.fr:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: French label for the project, if available.
  projects.type:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Categorization of the project (e.g., grant, initiative, consortium).
      notes: Values may include 'EU-FP', 'ANR', or other funding program codes.
  projects.year:
    status: draft
    type: long

    ai_suggestion:
      description: Year the project was officially recognized or funded.
      notes: May differ from publication year; use for temporal filtering of projects.
  publicationDate:
    status: approved
    type: date
    description: "Formatted as YYYY-MM-DDT00:00:00. When available, the `published_date`
      from Unpaywall is used. When not avaiable (no DOI Crossref), if data comes from
      HAL, these fields from HAL are used, in this priority order: `publicationDate_s`,
      `ePublicationDate_s`, `defenseDate_s`, `producedDate_s`."
    required: true
    example: "2020-01-01T00:00:00"
  software:
    status: draft
    type: object

    ai_suggestion:
      description: List of software artifacts (e.g., tools, libraries) referenced
        or described in the publication.
  software.contexts:
    status: draft
    type: text

    has_keyword: true
    ai_suggestion:
      description: Descriptive tags or categories for the software's application domain.
