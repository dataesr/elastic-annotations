    status: draft
    type: long
    ai_suggestion:
      description: Internal index identifier for the publication, used for sorting
        or pagination.
      notes: Not globally unique; combine with other fields (e.g., `id`) for precise
        lookups.
  keywords:
    status: draft
    type: object
