_meta:
  index: scanr-patents
  description: Patents filed by French research institutions. One document is one
    patent.
  total_fields: 147
  approved: 0
  draft: 147
fields:
  acronym:
    status: draft
    type: object
    ai_suggestion:
      description: Container for institution acronyms in multiple languages or formats.
      notes: Use the most specific language subfield available for queries to ensure
        precision.
  acronym.default:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: Default or primary acronym of the research institution.
      notes: Fallback when no language-specific acronym is available or preferred.
  acronym.en:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: English version of the institution's acronym.
      notes: Prefer this field for English-language applications or queries.
  acronym.fr:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: French version of the institution's acronym.
      notes: Primary field for French-language applications or queries.
  address:
    status: draft
    type: object
    ai_suggestion:
      description: Container for the physical address details of the institution.
      notes: Useful for geospatial queries or mapping applications.
  address.address:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Full street address of the research institution.
      notes: May include postal code; combine with city/country for full context.
  address.city:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: City where the research institution is located.
      notes: Normalize city names (e.g., 'Paris' instead of 'Paris Cedex') for consistency.
  address.country:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Country where the research institution is located.
      notes: Use ISO 3166-1 alpha-2 country codes (e.g., 'FR') if available.
  ai_description:
    status: draft
    type: object
    ai_suggestion:
      description: Container for AI-generated descriptions of the patent.
      notes: Descriptions may vary in detail or accuracy; validate for critical use
