  ai_description.description:
    status: draft
    type: object
    ai_suggestion:
      description: Container for multi-language AI-generated descriptions of the patent.
      notes: Use language-specific subfields to retrieve the most relevant description.
  ai_description.description.default:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Neutral-language summary of the patent's technical content and
