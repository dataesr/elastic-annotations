  recentAffiliations.structure.parents.structure:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Name of the parent organization at the time of affiliation
  recentAffiliations.structure.status:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Current operational status of the affiliated structure (e.g., 'active')
      notes: Use to filter defunct or inactive institutions.
  title_abs_text:
    status: draft
    type: text
    analyzer: heavy
    ai_suggestion:
      description: Full-text abstracts of the author's most cited works
      notes: Truncated to 5000 chars; prioritize recent/impactful works.
  top_domains:
    status: draft
    type: object
    ai_suggestion:
      description: Top-level research domains associated with the author's work
      notes: Derived from publication metadata; keys are domain codes.
  top_domains.code:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Standardized code for the research domain (e.g., '01' for Mathematics)
      notes: Aligns with field classification systems like OECD FOS.
  top_domains.count:
    status: draft
    type: long
    ai_suggestion:
      description: Total occurrences of this domain across the author's publications
      notes: Used to rank domains by frequency for relevance filtering.
  top_domains.label:
    status: draft
    type: object
    ai_suggestion:
      description: Localized display names for the domain in multiple languages
  top_domains.label.default:
    status: draft
    type: text
    has_keyword: true
    primary: true
    ai_suggestion:
      description: Default, untranslated name of the domain
      notes: Fallback when no language-specific label exists.
  top_domains.type:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Categorizes the domain (e.g., 'institution', 'company', 'government')
      notes: Helps agents distinguish academic vs. non-academic affiliations.
  web_content:
    status: draft
    type: text
    analyzer: heavy
    ai_suggestion:
      description: Raw HTML or text scraped from the author's public web profile
      notes: May contain unstructured data; use only for supplementary context.
