_meta:
  index: scanr-persons
  description: Researchers and authors with their affiliations and identifiers (ORCID,
    IdRef). One document is one person.
  total_fields: 283
  approved: 44
  draft: 239
  pending_review: 125
fields:
  acronym:
    status: draft
    type: object
    ai_suggestion:
      description: Contains acronyms of the person's primary affiliations in multiple
        languages
      notes: Use the language-specific fields (e.g., 'en', 'fr') to retrieve the acronym
        in the desired language.
  acronym.default:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: Default acronym of the person's primary affiliation when language
        is unspecified
  acronym.en:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: English acronym of the person's primary affiliation
  acronym.fr:
    status: draft
    type: text
    has_keyword: true
    analyzer: light
    ai_suggestion:
      description: French acronym of the person's primary affiliation
  address:
    status: draft
    type: object
    ai_suggestion:
      description: Physical address details of the person's primary affiliation
  address.address:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Full street address of the person's primary affiliation
  address.city:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: City of the person's primary affiliation address
  address.country:
    status: draft
    type: text
    analyzer: light
    ai_suggestion:
      description: Country of the person's primary affiliation address
  affiliations:
    status: approved
    type: array
    description: Lists all detected affiliations
  affiliations.endDate:
    status: approved
    type: string
    description: Last publication year found with this affiliation
  affiliations.publicationsCount:
    status: draft
    type: long
    ai_suggestion:
      description: Total number of publications associated with this affiliation
  affiliations.sources:
    status: approved
    type: array
    description: List the publications of the author with the current affiliation
  affiliations.sources.id:
    status: approved
    type: string
    description: Main PID of the publication
    has_keyword: true
  affiliations.sources.year:
    status: approved
    type: integer
    description: Publication year
    has_keyword: true
  affiliations.startDate:
    status: approved
    type: string
    description: First publication year found with this affiliation
  affiliations.structure:
    status: approved
    type: string
    description: 'PID of an affiliation. Can be the only field of the object if this
      affiliation is not mapped in the organization index.Otherwise, if present, some
      fields are denormalized: `mainAddress`, `label`, `acronym`, `kind`, `level`,
      `status`, `isFrench`, `id_name`. See the documentation of the organization index
      for more details on these fields.'
    required: true
  affiliations.structure.acronym:
    status: draft
    type: object
    ai_suggestion:
      description: Acronyms of the affiliated structure in multiple languages
      notes: Check for language-specific fields (e.g., 'en', 'fr') to disambiguate
        identical acronyms.
  affiliations.structure.acronym.default:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Default acronym of the affiliated organization, if available
      notes: Fallback when no language-specific acronym is present or preferred language
        is unknown.
  affiliations.structure.acronym.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English acronym of the affiliated organization
      notes: Use when the agent's context or user preference is English.
  affiliations.structure.acronym.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French acronym of the affiliated organization
      notes: Use when the agent's context or user preference is French.
  affiliations.structure.id:
    status: draft
    type: text
    has_keyword: true
    primary: true
    cross_ref:
      index: scanr-organizations
      join_field: id
    ai_suggestion:
      description: Unique identifier for the affiliated organization in the scanr-organizations
        index
      notes: Resolve this ID to fetch full organization details from the scanr-organizations
        index.
  affiliations.structure.id_name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Human-readable name associated with the organization's identifier
      notes: May differ from the label in 'institutions' due to historical or administrative
        changes.
  affiliations.structure.institutions:
    status: draft
    type: object
    ai_suggestion:
      description: Nested object containing historical or hierarchical institution
        data for the affiliation
      notes: Use to explore parent/child relationships or temporal changes in the
        organization.
  affiliations.structure.institutions.fromDate:
    status: draft
    type: date
    ai_suggestion:
      description: Start date when the institution's relationship with the structure
        became active
      notes: Compare with 'endDate' in affiliations to determine active periods.
  affiliations.structure.institutions.label:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Display name of the institution within the structure
      notes: May include department or sub-unit names for granularity.
  affiliations.structure.institutions.natural_id:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Persistent internal identifier for the institution, independent
        of name changes
      notes: Useful for tracking institutions across time or mergers.
  affiliations.structure.institutions.relationType:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Type of relationship between the institution and the structure
        (e.g., 'parent', 'child')
      notes: Helps determine hierarchy or collaboration roles in the organization.
  affiliations.structure.institutions.structure:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Hierarchical path of parent institutions for this affiliation
      notes: Use to reconstruct the full organizational tree; may be empty if no parent
        exists.
  affiliations.structure.isFrench:
    status: draft
    type: boolean
    ai_suggestion:
      description: Indicates if the affiliation is with a French institution
  affiliations.structure.kind:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
