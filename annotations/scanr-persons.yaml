  recentAffiliations.structure.acronym.en:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: English acronym of the affiliated structure
  recentAffiliations.structure.acronym.fr:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: French acronym of the affiliated structure
  recentAffiliations.structure.id:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Unique identifier for the affiliated structure
      notes: Use this for linking or querying the structure's details.
  recentAffiliations.structure.id_name:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Human-readable name of the identifier for the affiliated structure
      notes: Helps distinguish between different identifier types (e.g., ROR, GRID).
  recentAffiliations.structure.institutions:
