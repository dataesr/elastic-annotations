    type: integer
    description: Number of publications
    primary: true
  recentAffiliations:
    status: approved
    type: array
    description: Lists all detected affiliations, recents only (still active in the
      last 3 years)
  recentAffiliations.endDate:
    status: draft
    type: date
    ai_suggestion:
      description: Most recent date the author was affiliated with the institution
      notes: 'Format: YYYY-MM-DD; null if ongoing.'
  recentAffiliations.publicationsCount:
    status: draft
    type: long
    ai_suggestion:
      description: Total number of publications linked to this recent affiliation
  recentAffiliations.sources:
    status: draft
    type: object
    ai_suggestion:
      description: Metadata about publications supporting this recent affiliation
      notes: Keys are publication IDs; values contain year, title, etc.
  recentAffiliations.sources.id:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Main PID of the publication linked to the recent affiliation
      notes: Used to trace back to the original publication record.
  recentAffiliations.sources.year:
    status: draft
    type: text
    has_keyword: true
    ai_suggestion:
      description: Publication year for the source linked to the recent affiliation
      notes: May differ from the affiliation start date if the affiliation spans multiple
        years.
  recentAffiliations.startDate:
    status: draft
    type: date
    ai_suggestion:
      description: Earliest publication year found with this recent affiliation
  recentAffiliations.structure:
    status: draft
