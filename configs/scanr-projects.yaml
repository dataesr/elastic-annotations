scanr-projects:
  schema: scanr-projects.json
  annotation: scanr-projects.yaml
  content: "Funded research projects (ANR, EU, etc.) with budget and partners. One document is one project."
  primary_fields:
    - id
    - label.default
    - acronym.default
    - description.default
    - year
    - type
    - budgetTotal
    - budgetFinanced
    - keywords.en
    - actions.id
    - actions.label.default
    - call.id
    - project_domains.label.default
    - participants.structure.id
    - classification.primary_field
    - url
  excludes:
    - autocompleted
    - autocompletedText
    - encoded_key
  cross_refs:
    participants.structure.id:
      index: scanr-organizations
      join_field: id
  resolve:
    search_fields:
      - label.*
      - acronym.*
    source_fields:
      - label.default
      - acronym.default
