scanr-organizations:
  schema: scanr-organizations.json
  annotation: scanr-organizations.yaml
  content: "Research organizations and laboratories (universities, CNRS units, etc.). One document is one organization."
  primary_fields:
    - id
    - status
    - label.default
    - acronym.default
    - description.default
    - externalIds.id
    - externalIds.type
    - kind
    - isFrench
    - institutions.structure
    - institutions.label.default
    - institutions.relationType
  excludes:
    - autocompleted
    - autocompletedText
    - reasons_scanr
    - encoded_key
  resolve:
    search_fields:
      - label.*
      - acronym.*
    source_fields:
      - label.default
      - acronym.default
