name: Annotate Pipeline

on:
  workflow_dispatch:
    inputs:
      index:
        description: "Index to process (can be comma-separated for multiple)"
        required: true
        type: string
      skip_enrich:
        description: "Skip AI enrichment"
        required: false
        type: boolean
        default: false
      include_draft:
        description: "Include draft fields with empty description in the exported JSON schema"
        required: false
        type: boolean
        default: false
      include_ai_suggestion:
        description: "Include AI suggestions in the exported JSON schema"
        required: false
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          ES_URL: ${{ secrets.ES_URL }}
          ES_API_KEY: ${{ secrets.ES_API_KEY }}
          MISTRAL_COMPLETION_URL: ${{ secrets.MISTRAL_COMPLETION_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          ARGS=""

          if [ "${{ inputs.skip_enrich }}" == "true" ]; then
            ARGS="$ARGS --skip-enrich"
          fi

          if [ "${{ inputs.include_draft }}" == "true" ]; then
            ARGS="$ARGS --include-draft"
          fi

          if [ "${{ inputs.include_ai_suggestion }}" == "true" ]; then
            ARGS="$ARGS --include-ai-suggestion"
          fi

          # Parse comma-separated index input into multiple --index arguments
          IFS=',' read -ra INDEXES <<< "${{ inputs.index }}"
          for idx in "${INDEXES[@]}"; do
            # Trim whitespace
            idx=$(echo "$idx" | xargs)
            if [ -n "$idx" ]; then
              ARGS="$ARGS --index $idx"
            fi
          done

          echo "Running: uv run python main.py $ARGS"
          uv run python main.py $ARGS

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage both annotations and schemas directories
          git add annotations/ schemas/

          # Only commit if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "build(schema): update annotations and schemas automatically
            
            Triggered for indexes: ${{ inputs.index }}"
            git push
          else
            echo "No changes to annotations or schemas detected. Nothing to commit."
          fi
