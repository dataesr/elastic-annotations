on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      index:
        description: "Index(es) to process (comma-separated)"
        required: true
        type: string
      skip_enrich:
        required: false
        type: boolean
        default: false
      include_draft:
        required: false
        type: boolean
        default: false
      include_ai_suggestion:
        required: false
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
      - run: uv sync

      - name: Resolve inputs
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "index=scanr-all"   >> $GITHUB_OUTPUT
            echo "skip_enrich=false"           >> $GITHUB_OUTPUT
            echo "include_draft=false"         >> $GITHUB_OUTPUT
            echo "include_ai_suggestion=false" >> $GITHUB_OUTPUT
          else
            echo "index=${{ inputs.index }}"                         >> $GITHUB_OUTPUT
            echo "skip_enrich=${{ inputs.skip_enrich }}"             >> $GITHUB_OUTPUT
            echo "include_draft=${{ inputs.include_draft }}"         >> $GITHUB_OUTPUT
            echo "include_ai_suggestion=${{ inputs.include_ai_suggestion }}" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          ES_URL: ${{ secrets.ES_URL }}
          ES_API_KEY: ${{ secrets.ES_API_KEY }}
          MISTRAL_COMPLETION_URL: ${{ secrets.MISTRAL_COMPLETION_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          ARGS=""
          [ "${{ steps.vars.outputs.skip_enrich }}"           == "true" ] && ARGS="$ARGS --skip-enrich"
          [ "${{ steps.vars.outputs.include_draft }}"         == "true" ] && ARGS="$ARGS --include-draft"
          [ "${{ steps.vars.outputs.include_ai_suggestion }}" == "true" ] && ARGS="$ARGS --include-ai-suggestion"

          IFS=',' read -ra INDEXES <<< "${{ steps.vars.outputs.index }}"
          for idx in "${INDEXES[@]}"; do
            idx=$(echo "$idx" | xargs)
            [ -n "$idx" ] && ARGS="$ARGS --index $idx"
          done

          echo "Running: uv run python main.py $ARGS"
          uv run python main.py $ARGS

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add annotations/ schemas/
          if ! git diff-index --quiet HEAD; then
            git commit -m "build(schema): update annotations and schemas automatically

            Triggered for indexes: ${{ steps.vars.outputs.index }}"
            git push
          else
            echo "No changes detected. Nothing to commit."
          fi
